name: 每日抓取 LINE OA 好友數

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  scrape:
    name: 抓取好友數並提交 CSV
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright==1.44.0
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        env:
          FORCE: ${{ github.event.inputs.force || '0' }}
        run: python scripts/scraper.py

      - name: Commit updated CSV
      - name: Trigger Pages deployment
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/yafeng326/line-oa-monitor/pages/builds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.csv
          git diff --staged --quiet || git commit -m "data: $(date -u '+%Y-%m-%d') LINE OA 好友數更新"
          git push
