<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>房地產競品 LINE 好友數監控</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *{box-sizing:border-box}
  body{font-family:sans-serif;max-width:960px;margin:0 auto;padding:20px;background:#f5f5f5}
  h1{font-size:20px;color:#333;margin-bottom:4px}
  .updated{font-size:12px;color:#999;margin-bottom:20px}
  .cards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px}
  .card{background:#fff;border-radius:8px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
  .card .name{font-size:12px;margin-bottom:6px;font-weight:500}
  .card .num{font-size:18px;font-weight:bold;color:#222}
  .card .delta{font-size:11px;margin-top:4px}
  .up{color:#16a34a}.dn{color:#dc2626}
  .chart-box{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.08);margin-bottom:16px}
  .chart-box h2{font-size:14px;color:#555;margin:0 0 14px}
</style>
</head>
<body>
<h1>🏠 房地產競品 LINE 好友數監控</h1>
<div class="updated" id="updated"></div>
<div class="cards" id="cards"></div>
<div class="chart-box"><h2>📈 好友數趨勢</h2><canvas id="lineChart" height="80"></canvas></div>
<div class="chart-box"><h2>📊 每日新增好友數</h2><canvas id="barChart" height="80"></canvas></div>

<script>
const BRANDS = [
  {key:'reg5168',name:'5168實登',color:'#7c3aed'},
  {key:'buy5168',name:'5168買屋',color:'#2563eb'},
  {key:'f591',   name:'591房屋', color:'#dc2626'},
  {key:'leju',   name:'樂居',    color:'#059669'},
  {key:'lehu',   name:'樂屋',    color:'#d97706'},
];

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  const headers=lines[0].split(',').map(h=>h.trim());
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals=line.split(',');
    const obj={};
    headers.forEach((h,i)=>{
      const v=vals[i]?vals[i].trim():'';
      obj[h]=isNaN(v)||v===''?v:Number(v);
    });
    return obj;
  });
}

function render(rows){
  if(!rows||!rows.length){
    document.getElementById('updated').textContent='尚無資料';
    return;
  }
  const latest=rows[rows.length-1];
  const prev=rows.length>1?rows[rows.length-2]:null;
  const labels=rows.map(r=>r.date?r.date.slice(5):'');

  document.getElementById('updated').textContent='最後更新：'+latest.date;

  document.getElementById('cards').innerHTML=BRANDS.map(b=>{
    const val=latest[b.key]||0;
    const d=prev?(val-(prev[b.key]||0)):null;
    return `<div class="card">
      <div class="name" style="color:${b.color}">${b.name}</div>
      <div class="num">${val?val.toLocaleString():'–'}</div>
      ${d!==null?`<div class="delta ${d>=0?'up':'dn'}">${d>=0?'▲ +':'▼ '}${Math.abs(d).toLocaleString()}</div>`:''}
    </div>`;
  }).join('');

  new Chart(document.getElementById('lineChart'),{
    type:'line',
    data:{
      labels,
      datasets:BRANDS.map(b=>({
        label:b.name,
        data:rows.map(r=>r[b.key]||null),
        borderColor:b.color,backgroundColor:b.color+'18',
        borderWidth:2,pointRadius:3,tension:0.3,fill:false
      }))
    },
    options:{responsive:true,plugins:{legend:{position:'top'}},scales:{y:{ticks:{callback:v=>v.toLocaleString()}}}}
  });

  if(rows.length>1){
    new Chart(document.getElementById('barChart'),{
      type:'bar',
      data:{
        labels:labels.slice(1),
        datasets:BRANDS.map(b=>({
          label:b.name,
          data:rows.slice(1).map((r,i)=>(r[b.key]||0)-(rows[i][b.key]||0)),
          backgroundColor:b.color+'CC',borderRadius:3
        }))
      },
      options:{responsive:true,plugins:{legend:{position:'top'}}}
    });
  }
}

fetch('data/history.csv')
  .then(r=>{
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.text();
  })
  .then(text=>{
    console.log('CSV載入成功，內容：',text);
    render(parseCSV(text));
  })
  .catch(e=>{
    console.error('載入失敗：',e);
    document.getElementById('updated').textContent='資料載入失敗：'+e.message;
  });
</script>
</body>
</html>
